function normalizeExploreTag(value) {
  return String(value || '').trim().toLowerCase().replace(/[-_]+/g, ' ').replace(/\s+/g, ' ');
}

function formatExploreTag(value) {
  return String(value || '').replace(/-/g, ' ');
}

function buildGenreStyleIndex(albums) {
  const byTag = new Map();
  for (const album of albums || []) {
    for (const type of ['genres', 'styles']) {
      for (const tag of album[type] || []) {
        const key = normalizeExploreTag(tag);
        if (!key) continue;
        const current = byTag.get(key) || { tag, albums: [] };
        current.albums.push(album);
        byTag.set(key, current);
        byTag.set(normalizeExploreTag(formatExploreTag(tag)), current);
      }
    }
  }

  const options = [...byTag.values()]
    .map(({ tag, albums }) => ({ tag, label: formatExploreTag(tag), count: albums.length }))
    .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));

  return { byTag, options };
}

function searchAlbumsByGenreStyle(albums, index, query) {
  const normalized = normalizeExploreTag(query);
  if (!normalized) return { label: '', albums: [] };

  const exact = index.byTag.get(normalized);
  if (exact) {
    return {
      label: formatExploreTag(exact.tag),
      albums: [...exact.albums].sort((a, b) => (b.averageRating || 0) - (a.averageRating || 0) || (b.votes || 0) - (a.votes || 0)),
    };
  }

  const matches = (albums || []).filter(album => {
    const tags = [...(album.genres || []), ...(album.styles || [])];
    return tags.some(tag => normalizeExploreTag(tag).includes(normalized));
  });
  return {
    label: query.trim(),
    albums: matches.sort((a, b) => (b.averageRating || 0) - (a.averageRating || 0) || (b.votes || 0) - (a.votes || 0)),
  };
}

function DiscoverAlbumView({ albumSlug, projectName, source = 'global', hubData = null, initialTab = 'summary', reviewKeyword = '' }) {
  const catalog = useAlbumCatalog(source);
  const [discoverTab, setDiscoverTab] = useState(initialTab);
  useEffect(() => { catalog.load(); }, [catalog.load]);
  useEffect(() => { setDiscoverTab(initialTab); }, [albumSlug, initialTab]);
  const album = useMemo(() => catalog.albums.find(a => a.slug === albumSlug), [catalog.albums, albumSlug]);

  // Read streaming links from the album page cache without triggering a fetch.
  // The cache is populated when the user views the Global Reviews tab (GlobalReviewsPreview
  // fetches the same key). subscribeCacheKey keeps this in sync if that happens in-session.
  const [scrapedStreamingLinks, setScrapedStreamingLinks] = useState(() => {
    if (!album?.globalReviewsUrl) return null;
    const cached = readJsonCache(globalAlbumPageCacheKey(album.globalReviewsUrl));
    return cached?.value?.context?.streamingLinks ?? null;
  });
  useEffect(() => {
    if (!album?.globalReviewsUrl) return;
    return subscribeCacheKey(globalAlbumPageCacheKey(album.globalReviewsUrl), (value) => {
      setScrapedStreamingLinks(value?.context?.streamingLinks ?? null);
    });
  }, [album?.globalReviewsUrl]);

  // Supplement catalog data with hub's streaming IDs when available (hub data is authoritative)
  const fullAlbum = useMemo(() => {
    if (!album || !hubData) return album;
    for (const project of Object.values(hubData.members || {})) {
      if (!project || project.__error) continue;
      for (const entry of project.history || []) {
        if (entry.album && entry.album.spotifyId === album.spotifyId) {
          return { ...album, ...entry.album };
        }
      }
    }
    return album;
  }, [album, hubData]);

  if (catalog.status === 'loading' && !album) return html`<${LoadingNote} label="Loading…" />`;
  if (!album) return html`<div class="card"><p class="muted">Album not found.</p></div>`;

  const chips = [...(album.genres || []), ...(album.styles || [])];
  const thumb = album.images && album.images[0];

  return html`
    <div>
      <div class="banner te-banner">
        <a href=${readLastDiscoverPath(projectName)} onClick=${(e) => { e.preventDefault(); navigateTo(readLastDiscoverPath(projectName)); }}>← Explore</a>
      </div>
      <div class="card te-panel">
        <div class="today-layout">
          <div class="today-primary">
            ${thumb && html`<img class="album-art" src=${thumb.url} alt=${album.name} loading="lazy" decoding="async" />`}
            <p class="album-title">${album.name}</p>
            <p class="album-artist" style=${{ marginBottom: '12px' }}>${album.artist}${album.releaseDate ? ` (${album.releaseDate})` : ''}</p>
            ${chips.length > 0 && html`
              <div class="context-section-title" data-badge="sell">Genres & Styles</div>
              <div class="keyword-row" style=${{ marginBottom: '12px' }}>
                ${chips.map(g => html`<span class="keyword-chip">${g}</span>`)}
              </div>
            `}
            <div class="context-section-title" data-badge="headphones">Listen On</div>
            ${scrapedStreamingLinks
              ? html`<div class="links-row">${scrapedStreamingLinks.map(l => html`<a class="link-chip" href=${l.url} target="_blank" rel="noopener">${l.service}</a>`)}</div>`
              : html`<${StreamingLinks} album=${fullAlbum} />`
            }
          </div>
          <div class="today-secondary">
            <div class="album-panel">
              <div class="album-panel-tabs">
                <button type="button" class=${`album-panel-tab ${discoverTab === 'summary' ? 'active' : ''}`} onClick=${() => setDiscoverTab('summary')}>Summary</button>
                ${album.globalReviewsUrl && html`<button type="button" class=${`album-panel-tab ${discoverTab === 'reviews' ? 'active' : ''}`} onClick=${() => setDiscoverTab('reviews')}>Global Reviews</button>`}
              </div>
              ${discoverTab === 'summary' && html`
                <div class="context-grid">
                  ${album.averageRating && html`<div class="context-stat"><div class="value">★ ${album.averageRating.toFixed(2)}</div><div class="label">Global rating</div></div>`}
                  ${album.votes && html`<div class="context-stat"><div class="value">${album.votes.toLocaleString()}</div><div class="label">Votes</div></div>`}
                  ${album.controversialScore && html`<div class="context-stat"><div class="value">${album.controversialScore.toFixed(2)}</div><div class="label">Controversy</div></div>`}
                </div>
              `}
              ${discoverTab === 'reviews' && album.globalReviewsUrl && html`<${GlobalReviewsPreview} url=${album.globalReviewsUrl} initialKeyword=${reviewKeyword} />`}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function ExploreView({ projectName, source = 'global', mode = 'browse', initialQuery = '' }) {
  const catalog = useAlbumCatalog(source);
  const keywordEnabled = source !== 'user';
  const [query, setQuery] = useState('');
  const [kwQuery, setKwQuery] = useState(mode === 'keyword' ? initialQuery : '');
  const [kwResults, setKwResults] = useState(null);
  const [kwStatus, setKwStatus] = useState(mode === 'keyword' && initialQuery ? 'loading' : 'idle');
  const [kwError, setKwError] = useState('');
  const [tagQuery, setTagQuery] = useState(mode === 'genre-style' ? initialQuery : '');
  const [tagResults, setTagResults] = useState(null);
  const [tagSearched, setTagSearched] = useState('');
  const [tagSuggestActive, setTagSuggestActive] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { catalog.load(); }, [catalog.load]);

  useEffect(() => {
    if (source === 'user' && mode === 'keyword') {
      navigateTo(discoverModeRoutePath(projectName, source, 'browse'));
    }
  }, [projectName, source, mode]);

  useEffect(() => {
    writeLastDiscoverPath(projectName, discoverModeRoutePath(projectName, source, mode, initialQuery));
  }, [projectName, source, mode, initialQuery]);

  useEffect(() => {
    const t = setTimeout(() => inputRef.current?.focus(), 50);
    return () => clearTimeout(t);
  }, [mode, source]);

  const browseAlbums = useMemo(() => {
    if (!catalog.albums.length) return [];
    const sorted = [...catalog.albums].sort((a, b) => b.votes - a.votes);
    if (!query.trim()) return sorted.slice(0, 50);
    const q = query.toLowerCase();
    return sorted.filter(a => a.name.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q));
  }, [catalog.albums, query]);

  const catalogBySpotifyId = useMemo(() => {
    const map = {};
    for (const a of catalog.albums) if (a.spotifyId) map[a.spotifyId] = a;
    return map;
  }, [catalog.albums]);

  const genreStyleIndex = useMemo(() => buildGenreStyleIndex(catalog.albums), [catalog.albums]);
  const tagSuggestions = useMemo(() => {
    const q = normalizeExploreTag(tagQuery);
    const options = genreStyleIndex.options;
    if (!q) return [];
    return options
      .filter(option => normalizeExploreTag(option.label).includes(q))
      .slice(0, 8);
  }, [genreStyleIndex, tagQuery]);

  useEffect(() => {
    if (mode !== 'keyword' || !keywordEnabled) return;
    setKwQuery(initialQuery || '');
    setKwResults(null);
    setKwError('');
    if (!initialQuery) { setKwStatus('idle'); return; }
    let cancelled = false;
    setKwStatus('loading');
    searchAlbumsByWord(initialQuery)
      .then(results => {
        if (!cancelled) {
          setKwResults(results);
          setKwStatus('ready');
        }
      })
      .catch(err => {
        if (!cancelled) {
          setKwError(err.message);
          setKwStatus('error');
        }
      });
    return () => { cancelled = true; };
  }, [mode, initialQuery, keywordEnabled]);

  useEffect(() => {
    if (mode !== 'genre-style') return;
    setTagQuery(initialQuery || '');
    setTagSuggestActive(false);
    if (!initialQuery || catalog.status !== 'ready') {
      setTagResults(null);
      setTagSearched('');
      return;
    }
    const result = searchAlbumsByGenreStyle(catalog.albums, genreStyleIndex, initialQuery);
    setTagResults(result.albums);
    setTagSearched(result.label);
  }, [mode, initialQuery, catalog.status, catalog.albums, genreStyleIndex]);

  const handleAlbumClick = (album) => {
    writeLastDiscoverPath(projectName, discoverModeRoutePath(projectName, source, mode, mode === 'keyword' ? kwQuery : (mode === 'genre-style' ? tagSearched || tagQuery : '')));
    if (mode === 'keyword' && kwQuery.trim()) {
      navigateTo(discoverAlbumRoutePath(projectName, album.slug, source, 'reviews', kwQuery));
      return;
    }
    navigateTo(discoverAlbumRoutePath(projectName, album.slug, source));
  };

  const handleKwSearch = async (e) => {
    e.preventDefault();
    if (!kwQuery.trim()) return;
    navigateTo(discoverModeRoutePath(projectName, source, 'keyword', kwQuery));
  };

  const handleGenreStyleSearch = (e) => {
    e.preventDefault();
    if (!tagQuery.trim()) return;
    const result = searchAlbumsByGenreStyle(catalog.albums, genreStyleIndex, tagQuery);
    setTagSuggestActive(false);
    navigateTo(discoverModeRoutePath(projectName, source, 'genre-style', result.label || tagQuery));
  };

  const selectGenreStyleSuggestion = (label) => {
    setTagQuery(label);
    setTagSuggestActive(false);
    navigateTo(discoverModeRoutePath(projectName, source, 'genre-style', label));
  };

  const cacheAge = catalog.fetchedAt ? formatCacheAge(catalog.fetchedAt) : null;
  const showTagSuggestions = tagSuggestActive && tagQuery.trim() && tagSuggestions.length > 0;

  return html`
    <div class="card" style=${{ padding: 0 }}>
      <div class="modal-header" style=${{ borderRadius: 'var(--radius) var(--radius) 0 0' }}>
        <div class="modal-title">Explore Albums</div>
        <div style=${{ display: 'flex', gap: '8px', flexWrap: 'wrap', justifyContent: 'flex-end' }}>
          <div class="explore-source-toggle">
            <button class=${`explore-source-btn ${source === 'global' ? 'active' : ''}`} type="button" onClick=${() => navigateTo(discoverModeRoutePath(projectName, 'global', mode, mode === 'keyword' ? kwQuery : (mode === 'genre-style' ? tagSearched || tagQuery : '')))}>Global</button>
            <button class=${`explore-source-btn ${source === 'user' ? 'active' : ''}`} type="button" onClick=${() => navigateTo(discoverModeRoutePath(projectName, 'user', mode, mode === 'keyword' ? kwQuery : (mode === 'genre-style' ? tagSearched || tagQuery : '')))}>User albums</button>
          </div>
          <div class="explore-mode-toggle">
            <button class=${`explore-mode-btn ${mode === 'browse' ? 'active' : ''}`} type="button" onClick=${() => navigateTo(discoverModeRoutePath(projectName, source, 'browse'))}>Browse</button>
            ${keywordEnabled && html`<button class=${`explore-mode-btn ${mode === 'keyword' ? 'active' : ''}`} type="button" onClick=${() => navigateTo(discoverModeRoutePath(projectName, source, 'keyword'))}>Keyword</button>`}
            <button class=${`explore-mode-btn ${mode === 'genre-style' ? 'active' : ''}`} type="button" onClick=${() => navigateTo(discoverModeRoutePath(projectName, source, 'genre-style'))}>Genres</button>
          </div>
        </div>
      </div>

      ${mode === 'browse' && html`
        <div class="explore-controls">
          <div class="explore-search-row">
            <span class="icon-symbol explore-search-icon">search</span>
            <input
              ref=${inputRef}
              class="explore-input"
              type="search"
              placeholder="Filter by album or artist…"
              value=${query}
              onInput=${e => setQuery(e.target.value)}
              aria-label="Filter albums"
            />
            <button
              class="bell-link"
              type="button"
              title=${cacheAge ? `${source === 'user' ? 'User albums' : 'Global catalog'} cached ${cacheAge} — click to refresh` : 'Refresh catalog'}
              aria-label="Force refresh album catalog"
              onClick=${() => catalog.load(true)}
              disabled=${catalog.status === 'loading'}
            >
              <span class="icon-symbol">refresh</span>
            </button>
          </div>
          ${cacheAge && html`<div class="explore-cache-note">${source === 'user' ? 'User albums' : 'Global catalog'} cached ${cacheAge}</div>`}
        </div>
        <div class="explore-results" role="list">
          ${catalog.status === 'loading' && html`<${LoadingNote} label="Loading album catalog…" />`}
          ${catalog.status === 'error' && html`<p class="muted" style=${{ padding: '16px' }}>Failed to load. <button class="link-chip" type="button" onClick=${() => catalog.load(true)}>Retry</button></p>`}
          ${catalog.status === 'ready' && html`
            ${!query.trim() && html`<p class="explore-hint">Showing ${browseAlbums.length} most-voted ${source === 'user' ? 'user albums' : 'albums'} — search to filter all 1001</p>`}
            ${query.trim() && !browseAlbums.length && html`<p class="muted" style=${{ padding: '16px' }}>No albums match "${query}"</p>`}

          `}
        </div>
      `}

      ${mode === 'keyword' && html`
        <div class="explore-controls">
          ${keywordEnabled
            ? html`
              <form class="explore-search-row" onSubmit=${handleKwSearch}>
                <span class="icon-symbol explore-search-icon">travel_explore</span>
                <input
                  ref=${inputRef}
                  class="explore-input"
                  type="search"
                  placeholder="e.g. melancholy, psychedelic, masterpiece…"
                  value=${kwQuery}
                  onInput=${e => setKwQuery(e.target.value)}
                  aria-label="Search reviews for keyword"
                />
                <button class="link-chip" type="submit" disabled=${kwStatus === 'loading' || !kwQuery.trim()}>Search</button>
              </form>
              <div class="explore-cache-note">Albums ranked by how often your term appears in site-wide reviews</div>
            `
            : html`
              <p class="muted" style=${{ padding: '16px' }}>Keyword search is only available for the global album catalog.</p>
              <div class="explore-cache-note">Switch to Global to search review text.</div>
            `
          }
        </div>
        <div class="explore-results" role="list">
          ${keywordEnabled && html`
            ${kwStatus === 'idle' && html`<p class="explore-hint">Find albums by what reviewers say about them</p>`}
            ${kwStatus === 'loading' && html`<${LoadingNote} label="Searching reviews…" />`}
            ${kwStatus === 'error' && html`<p class="muted" style=${{ padding: '16px' }}>${kwError}</p>`}
            ${kwStatus === 'ready' && !kwResults?.length && html`<p class="muted" style=${{ padding: '16px' }}>No results for "${kwQuery}"</p>`}
            ${kwStatus === 'ready' && kwResults?.map(r => {
              const catalogAlbum = catalogBySpotifyId[r.albumId];
              const album = catalogAlbum || { name: r.albumName, artist: r.artistName, slug: r.albumSlug, spotifyId: r.albumId };
              return html`<${ExploreAlbumRow} key=${r.albumId} album=${album} mentionCount=${r.wordCount} onClick=${handleAlbumClick} />`;
            })}
          `}
        </div>
      `}

      ${mode === 'genre-style' && html`
        <div class="explore-controls">
          <form class="explore-search-row" onSubmit=${handleGenreStyleSearch}>
            <span class="icon-symbol explore-search-icon">sell</span>
            <div class="explore-suggest-wrap">
              <input
                ref=${inputRef}
                class="explore-input"
                type="search"
                placeholder="e.g. psychedelic rock, soul, hip hop…"
                value=${tagQuery}
                onInput=${e => { setTagQuery(e.target.value); setTagSuggestActive(true); }}
                onFocus=${() => setTagSuggestActive(false)}
                onBlur=${() => setTimeout(() => setTagSuggestActive(false), 120)}
                aria-label="Search genres and styles"
                aria-autocomplete="list"
                aria-expanded=${showTagSuggestions}
              />
              ${showTagSuggestions && html`
                <div class="explore-suggestions" role="listbox">
                  ${tagSuggestions.map(option => html`
                    <button
                      type="button"
                      class="explore-suggestion"
                      role="option"
                      onMouseDown=${e => e.preventDefault()}
                      onClick=${() => selectGenreStyleSuggestion(option.label)}
                    >
                      <span>${option.label}</span>
                      <span class="explore-suggestion-count">${option.count}</span>
                    </button>
                  `)}
                </div>
              `}
            </div>
            <button class="link-chip" type="submit" disabled=${catalog.status === 'loading' || !tagQuery.trim()}>Search</button>
          </form>
          <div class="explore-cache-note">Genres and styles are combined from the album catalog</div>
        </div>
        <div class="explore-results" role="list">
          ${catalog.status === 'loading' && html`<${LoadingNote} label="Loading album catalog…" />`}
          ${catalog.status === 'error' && html`<p class="muted" style=${{ padding: '16px' }}>Failed to load. <button class="link-chip" type="button" onClick=${() => catalog.load(true)}>Retry</button></p>`}
          ${catalog.status === 'ready' && !tagResults && html`<p class="explore-hint">Search known genre/style tags across all albums</p>`}
          ${catalog.status === 'ready' && tagResults && html`
            ${tagResults.length > 0
              ? html`<p class="explore-hint">${tagResults.length} album${tagResults.length !== 1 ? 's' : ''} tagged "${tagSearched}"</p>`
              : html`<p class="muted" style=${{ padding: '16px' }}>No albums match "${tagSearched}"</p>`
            }
            ${tagResults.map(album => html`<${ExploreAlbumRow} key=${album.spotifyId || album.slug} album=${album} onClick=${handleAlbumClick} />`)}
          `}
        </div>
      `}
    </div>
  `;
}

function Nav({ projectName, tab, backlogCount, unreadCount, theme }) {
  const topTabs = [
    { id: 'today', label: 'Today' },
    { id: 'backlog', label: `Backlog${backlogCount ? ` (${backlogCount})` : ''}` },
    { id: 'group', label: 'Group' },
    { id: 'me', label: 'Me' },
  ];
  const bottomTabs = [
    { id: 'today', label: 'Today', icon: 'home' },
    { id: 'backlog', label: 'Backlog', icon: 'queue_music', badge: backlogCount },
    { id: 'group', label: 'Group', icon: 'group' },
    { id: 'me', label: 'Me', icon: 'person' },
  ];
  // The tab strip scrolls horizontally on narrow screens (it no longer wraps), so without this
  // the active tab can land scrolled out of view on load — e.g. opening straight to Me shows
  // just a sliver of its solid accent fill at the right edge instead of the "Me" label.
  const tabsRef = useRef(null);
  useEffect(() => {
    const active = tabsRef.current && tabsRef.current.querySelector('.tab.active');
    if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest' });
  }, [tab]);
  return html`
    <${Fragment}>
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand"><${LankyMascot} /><span class="brand-text">1001 Albums Kongsole</span><span class="brand-text-mobile">Kongsole</span></div>
          <nav class="tabs" ref=${tabsRef}>
            ${topTabs.map((t, i) => html`
              ${i > 0 && html`<span class="tab-sep">|</span>`}
              <a class=${`tab ${tab === t.id ? 'active' : ''}`} href=${routePath(projectName, t.id)} onClick=${(e) => { e.preventDefault(); setVtDirection(tab, t.id); navigateTo(routePath(projectName, t.id)); }}>${t.label}</a>
            `)}
          </nav>
          <div class="nav-actions">
            <button
              class=${`bell-link ${tab === 'discover' ? 'active' : ''}`}
              type="button"
              aria-label="Explore albums"
              title="Explore albums"
              onClick=${() => navigateTo(routePath(projectName, 'discover'))}
            >
              <span class="icon-symbol">search</span>
            </button>
            <a
              class=${`bell-link ${tab === 'activity' ? 'active' : ''}`}
              href=${routePath(projectName, 'activity')}
              onClick=${(e) => { e.preventDefault(); setVtDirection(tab, 'activity'); navigateTo(routePath(projectName, 'activity')); }}
              aria-label=${`Notifications${unreadCount ? `, ${unreadCount} unread` : ''}`}
              title="Recent activity"
            >
              <span class="icon-symbol">notifications</span>${unreadCount > 0 && html`<span class="bell-badge">${unreadCount > 99 ? '99+' : unreadCount}</span>`}
            </a>
            <a
              class=${`bell-link ${tab === 'settings' ? 'active' : ''}`}
              href=${routePath(projectName, 'settings')}
              onClick=${(e) => { e.preventDefault(); navigateTo(routePath(projectName, 'settings')); }}
              aria-label="Settings"
              title="Settings"
            >
              <span class="icon-symbol">settings</span>
            </a>
          </div>
        </div>
      </header>
      <nav
        class="bottom-nav"
        aria-label="Main navigation"
        style=${{ height: '58px', minHeight: '58px', maxHeight: '58px', padding: 0 }}
      >
        ${bottomTabs.map(t => html`
          <a
            class=${`bottom-nav-item ${tab === t.id ? 'active' : ''}`}
            style=${{ height: '58px', minHeight: '58px', maxHeight: '58px' }}
            href=${routePath(projectName, t.id)}
            onClick=${(e) => { e.preventDefault(); haptic(6); setVtDirection(tab, t.id); navigateTo(routePath(projectName, t.id)); }}
            aria-label=${t.badge ? `${t.label}, ${t.badge} items` : t.label}
            aria-current=${tab === t.id ? 'page' : undefined}
          >
            <span class="bottom-nav-icon" aria-hidden="true">${t.icon}</span>
            <span class="bottom-nav-label">${t.label}</span>
            ${t.badge > 0 && html`<span class="bell-badge" style="top:4px;right:calc(50% - 18px)">${t.badge > 99 ? '99+' : t.badge}</span>`}
          </a>

}

function ListeningNoteEditor({ projectName, albumId, initialNotes }) {
  const [notes, setNotes] = useState(initialNotes || '');
  const [status, setStatus] = useState('idle');
  const [errorMessage, setErrorMessage] = useState('');

  useEffect(() => { setNotes(initialNotes || ''); setStatus('idle'); setErrorMessage(''); }, [albumId, initialNotes]);

  const save = async () => {
    setStatus('saving');
    try {
      await saveListeningNote(projectName, albumId, notes);
      setStatus('saved');
    } catch (e) {
      setStatus('error');
      setErrorMessage(e.message || "Couldn't save — try again.");
    }
  };

  return html`
    <div style=${{ marginTop: '12px' }}>
      <div class="context-section-title" data-badge="edit_note">Listening Note</div>
      <textarea
        class="rate-optional-notes"
        style=${{ width: '100%', minHeight: '180px', padding: '8px 10px', font: 'inherit', resize: 'vertical' }}
        placeholder="Optional listening note…"
        value=${notes}
        onInput=${(e) => { setNotes(e.target.value); setStatus('idle'); }}
        enterkeyhint="enter" autocomplete="off"
      ></textarea>
      <div style=${{ display: 'flex', alignItems: 'center', gap: '10px', marginTop: '6px' }}>
        <button class="pill-btn primary" type="button" disabled=${status === 'saving'} onClick=${save}>
          ${status === 'saving' ? 'Saving…' : 'Save note'}
        </button>
        ${status === 'saved' && html`<span class="muted">Saved.</span>`}
        ${status === 'error' && html`<span class="muted">${errorMessage}</span>`}
      </div>
    </div>
  `;
}

function RatingEditor({ projectName, albumUuid, generatedAlbumId, initialNotes, onRated }) {
  const [rating, setRating] = useState(0);
  const [notes, setNotes] = useState(initialNotes || '');
  const [status, setStatus] = useState('idle');
  const [errorMessage, setErrorMessage] = useState('');

  // Carries over any note already saved on this entry (e.g. via the listening-note editor while
  // it was still currentAlbum) — same field (`review`) the real site's history page reads to
  // pre-fill its own rating form, so you can edit or accept it rather than starting blank.
  useEffect(() => { setNotes(initialNotes || ''); }, [albumUuid, initialNotes]);

  const submit = async () => {
    if (!rating) return;
    setStatus('saving');
    try {
      await saveRating(projectName, albumUuid, generatedAlbumId, rating, notes);
      setStatus('saved');
      haptic([10, 40, 20]);
      if (onRated) onRated();
    } catch (e) {
      setStatus('error');
      haptic([30, 50, 30]);
      setErrorMessage(e.message || "Couldn't submit rating — try again.");
    }
  };

  return html`
    <div style=${{ marginTop: '12px', marginBottom: '16px' }}>
      <div class="context-section-title" data-badge="rate_review">Rate Album</div>
      <div class="rating-stars" role="group" aria-label="Rating">
        ${[1, 2, 3, 4, 5].map(n => html`
          <button
            type="button"
            class=${`star-pick ${n <= rating ? 'active' : ''}`}
            aria-label=${`${n} star${n === 1 ? '' : 's'}`}
            onClick=${() => { haptic(8); setRating(n); setStatus('idle'); }}
          >★</button>
        `)}
      </div>
      <textarea
        class="rate-optional-notes"
        style=${{ width: '100%', minHeight: '90px', padding: '8px 10px', font: 'inherit', resize: 'vertical', marginTop: '8px' }}
        placeholder="Optional review…"
        value=${notes}
        onInput=${(e) => { setNotes(e.target.value); setStatus('idle'); }}
        enterkeyhint="enter" autocomplete="off"
      ></textarea>
      <div style=${{ display: 'flex', alignItems: 'center', gap: '10px', marginTop: '6px' }}>
        <button class="pill-btn primary" type="button" disabled=${status === 'saving' || !rating} onClick=${submit}>
          ${status === 'saving' ? 'Submitting…' : 'Submit rating'}
        </button>
        ${status === 'saved' && html`<span class="muted">Saved.</span>`}
        ${status === 'error' && html`<span class="muted">${errorMessage}</span>`}
      </div>
    </div>
  `;
}

// ---------- Group ----------
const GROUP_ALBUMS_VISIBLE_DEFAULT = 50;

function GroupView({ group, members, projectName }) {
  const [sortBy, setSortBy] = useState('date');
  const [showAllAlbums, setShowAllAlbums] = useState(false);
  const albumTable = useMemo(() => deriveGroupAlbumTable(members), [members]);
  const alignment = useMemo(() => deriveAlignment(members), [members]);
  const sortedAlbums = useMemo(() => {
    const rows = albumTable.slice();
    if (sortBy === 'rating') rows.sort((a, b) => (b.averageRating || 0) - (a.averageRating || 0));
    else if (sortBy === 'date') rows.sort((a, b) => new Date(b.earliestAt) - new Date(a.earliestAt));
    return rows;
  }, [albumTable, sortBy]);
  const visibleAlbums = showAllAlbums ? sortedAlbums : sortedAlbums.slice(0, GROUP_ALBUMS_VISIBLE_DEFAULT);

  if (!group) return html`<div class="card"><p class="muted">This project isn't part of a group.</p></div>`;

  const roster = group.members.map(m => {
    const proj = members[m.name];
    const unrated = proj && !proj.__error ? deriveBacklog(proj).length : null;
    const lastRated = proj && !proj.__error
      ? (proj.history || []).filter(e => 'rating' in e).slice(-1)[0]
      : null;
    return { name: m.name, unrated, lastRatedAt: lastRated ? lastRated.generatedAt : null, error: proj && proj.__error };
  });

  return html`
    <div>
      <div class="card te-panel">
        <h2>${group.name}</h2>
        <div class="grid cols-3">
          <div class="stat"><div class="num">${group.numberOfGeneratedAlbums}</div><div class="label">Albums</div></div>
          <div class="stat"><div class="num">${group.totalVotes}</div><div class="label">Votes</div></div>
          <div class="stat"><div class="num">${group.averageRating}</div><div class="label">Avg Rating</div></div>
        </div>
      </div>

      <div class="card te-panel">
        <h2>Roster</h2>
        <table>
          <thead><tr><th>Member</th><th>Unrated</th><th>Last rated</th></tr></thead>
          <tbody>
            ${roster.map(r => html`
              <tr>
                <td><a class="row-link" href=${memberRoutePath(projectName, r.name)} onClick=${(e) => { e.preventDefault(); navigateTo(memberRoutePath(projectName, r.name)); }}>${r.name}</a>${r.name === projectName ? ' (you)' : ''}</td>
                <td>${r.error ? '—' : html`${r.unrated > 0 ? html`<span class="badge">${r.unrated}</span>` : html`<span class="icon-symbol" style=${{ fontSize: '16px', color: 'var(--good)', verticalAlign: 'middle' }}>check</span>`}`}</td>
                <td>${r.lastRatedAt ? new Date(r.lastRatedAt).toLocaleDateString() : '—'}</td>
              </tr>
            `)}
          </tbody>
        </table>
      </div>

      <div class="grid cols-2">
        <div class="card te-panel">
          <h3>Group Favorites</h3>
          <p>Decade: <strong>${group.ratingByDecade && group.ratingByDecade.length ? group.ratingByDecade.slice().sort((a,b)=>b.rating-a.rating)[0].decade : '—'}</strong></p>
          <p>Genre: <strong>${group.favoriteGenres && group.favoriteGenres[0] ? group.favoriteGenres[0].genre : '—'}</strong></p>
        </div>
        <div class="card te-panel">
          <h3>Group Least Favorites</h3>
          <p>Genre: <strong>${group.worstGenres && group.worstGenres[0] ? group.worstGenres[0].genre : '—'}</strong></p>
        </div>
      </div>

      <div class="card te-panel">
        <h2>All Rated Albums (${sortedAlbums.length})</h2>
        <p class="muted">Computed client-side from every member's history — the public API only exposes the top/bottom 5.</p>
        <div class="sort-controls">
          <button class=${sortBy === 'date' ? 'active' : ''} onClick=${() => { setSortBy('date'); setShowAllAlbums(false); }}>Date</button>
          <button class=${sortBy === 'rating' ? 'active' : ''} onClick=${() => { setSortBy('rating'); setShowAllAlbums(false); }}>Rating</button>
        </div>
        <table>
          <thead><tr><th>Album</th><th>Artist</th><th>Rating</th><th>Votes</th></tr></thead>
          <tbody>
            ${visibleAlbums.map(r => html`
              <tr>
                <td><a class="row-link" href=${routePath(projectName, 'album', r.album.uuid, 'group')} onClick=${(event) => { event.preventDefault(); navigateTo(routePath(projectName, 'album', r.album.uuid, 'group')); }}>${r.album.name}</a></td>
                <td>${r.album.artist}</td>
                <td>${r.averageRating != null ? html`<span class=${`rating-tier-${ratingTier(r.averageRating)}`} style=${{ fontWeight: 700 }}>${r.averageRating}</span>` : '—'}</td>
                <td>${r.votes}</td>
              </tr>
            `)}
          </tbody>
        </table>
        ${sortedAlbums.length > GROUP_ALBUMS_VISIBLE_DEFAULT && html`
          <a class="show-all-link" href="#" onClick=${(e) => { e.preventDefault(); setShowAllAlbums(!showAllAlbums); }}>${showAllAlbums ? 'Show fewer' : `Show all ${sortedAlbums.length} →`}</a>
        `}
      </div>

      <div class="card te-panel">
        <h2>Taste Alignment</h2>
        <p class="disclaimer">Our own estimate (100 × (1 − mean rating difference ÷ 4) over albums both members rated, min. 2 shared) — not the site's official algorithm. See the <${SiteModalLink} href=${`${SITE_BASE}/groups/${encodeURIComponent(group.slug)}/taste-alignments`} title="Official alignments">official Alignments page<//> for that.</p>
        <table>
          <thead><tr><th>Pair</th><th>Alignment</th><th>Shared albums</th></tr></thead>
          <tbody>
            ${alignment.map(p => html`
              <tr>

// ---------- App ----------
function usePullToRefresh(onRefresh, enabled, scrollRef) {
  const [pullY, setPullY] = useState(0);
  const refs = useRef({ startY: null, pullY: 0, pulling: false, onRefresh });
  refs.current.onRefresh = onRefresh;
  const THRESHOLD = 64;
  useEffect(() => {
    if (!enabled) { setPullY(0); return; }
    const r = refs.current;
    const scrollTop = () => {
      if (scrollRef && scrollRef.current && scrollRef.current.scrollHeight > scrollRef.current.clientHeight + 1) {
        return scrollRef.current.scrollTop || 0;
      }
      const scroller = document.scrollingElement || document.documentElement;
      return Math.max(window.scrollY || 0, scroller.scrollTop || 0, document.body.scrollTop || 0);
    };
    const atTop = () => scrollTop() <= 2;
    const reset = () => {
      r.startY = null;
      r.pullY = 0;
      r.pulling = false;
      setPullY(0);
    };
    const onTouchStart = (e) => {
      if (e.touches.length === 1 && atTop()) {
        r.startY = e.touches[0].clientY;
        r.pullY = 0;
        r.pulling = false;
      }
    };
    const onTouchMove = (e) => {
      if (r.startY === null) return;
      const dy = e.touches[0].clientY - r.startY;
      if (dy <= 0) {
        reset();
        return;
      }
      if (!r.pulling && !atTop()) {
        reset();
        return;
      }
      if (dy < 6) return;
      r.pulling = true;
      if (e.cancelable) e.preventDefault();
      const rubber = Math.min(Math.sqrt(dy) * 4, THRESHOLD * 1.5);
      r.pullY = rubber;
      setPullY(rubber);
    };
    const onTouchEnd = () => {
      if (r.startY === null) return;
      if (r.pullY >= THRESHOLD) { haptic([10, 40, 20]); r.onRefresh(); }
      reset();
    };
    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
    document.addEventListener('touchcancel', reset);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      document.removeEventListener('touchcancel', reset);
    };
  }, [enabled, scrollRef]);
  return pullY;
}

function App() {
  const [route, setRoute] = useState(getRouteFromLocation());
  const { projectName, tab, backlogAlbumId, albumId, subTab, discoverSource, discoverMode, discoverQuery, discoverAlbumTab, discoverReviewKeyword, pairA, pairB, memberName } = route;
  const currentProjectName = !projectName ? readCurrentProjectName() : '';
  const theme = useTheme();
  const pageRef = useRef(null);

  useEffect(() => {
    const onNav = () => {
      const newRoute = getRouteFromLocation();
      if (document.startViewTransition) {
        const t = document.startViewTransition(() => setRoute(newRoute));
        t.finished.then(() => delete document.documentElement.dataset.vt);
      } else {
        setRoute(newRoute);
        delete document.documentElement.dataset.vt;
      }
    };
    window.addEventListener('hashchange', onNav);
    return () => {
      window.removeEventListener('hashchange', onNav);
    };
  }, []);

  useEffect(() => {
    if (projectName || !currentProjectName) return;
    navigateTo(routePath(currentProjectName));
  }, [projectName, currentProjectName]);

  // Hash-based navigation doesn't reset scroll position like a real page load does, so
  // jumping between views (e.g. clicking a pair link from the bottom of Group) would
  // otherwise leave you scrolled wherever the previous view left off.
  useEffect(() => {
    if (pageRef.current) pageRef.current.scrollTo({ top: 0, left: 0 });
    window.scrollTo(0, 0);
  }, [tab, backlogAlbumId, albumId, discoverSource, discoverMode, discoverQuery, discoverAlbumTab, discoverReviewKeyword, pairA, pairB]);

  const hub = useHub(projectName);
  const notifications = useNotifications(projectName);
  const PTR_THRESHOLD = 64;
  const pullY = usePullToRefresh(hub.refresh, hub.status === 'ready' && !hub.refreshing, pageRef);
  const pullProgress = Math.min(pullY / PTR_THRESHOLD, 1);
  const pagePullY = pullY > 0 ? Math.min(pullY * 0.58, 48) : 0;

  if (!projectName && currentProjectName) return null;
  if (!projectName) return html`<${NameEntry} theme=${theme} />`;

  const backlog = hub.data ? deriveBacklog(hub.data.me) : [];
  const backlogEntry = backlogAlbumId
    ? backlog.find(e => backlogEntryId(e) === backlogAlbumId)
    : null;
  const albumRecord = hub.data && albumId ? findAlbumInHub(hub.data, albumId) : null;
  const groupSlug = hub.data && hub.data.group ? hub.data.group.slug : null;
  const todayAlbumId = tab === 'today' && hub.data && hub.data.me.currentAlbum ? hub.data.me.currentAlbum.uuid : null;
  const activeAlbumId = albumId || (backlogEntry && backlogEntry.album ? backlogEntry.album.uuid : null) || todayAlbumId;
  const comparison = hub.data && activeAlbumId
    ? computeAlbumComparison(hub.data, activeAlbumId, projectName, backlogEntry ? backlogEntry.globalRating : (albumRecord ? albumRecord.globalRating : null))
    : null;

  return html`
    <div class="app-shell">
      <${Nav} projectName=${projectName} tab=${(tab === 'album' || tab === 'pair' || tab === 'member') ? 'today' : tab} backlogCount=${backlog.length} unreadCount=${notifications.notifications.length} theme=${theme} />
      <${RefreshErrorToast} error=${hub.refreshError} onDismiss=${hub.dismissRefreshError} />
      ${pullY > 0 && html`
        <div class="ptr-indicator" style=${{
          transform: `translate(-50%, ${pullProgress * 52 - 52 + pagePullY * 0.2}px)`,
          opacity: pullProgress,
        }}>
          <span class="icon-symbol" style=${{
            display: 'block',
            transform: `rotate(${pullProgress * 240}deg)`,
            color: pullY >= PTR_THRESHOLD ? 'var(--accent)' : 'var(--text-dim)',
          }}>refresh</span>
        </div>
      `}
      <main ref=${pageRef} class=${`page ${pullY > 0 ? 'is-pulling' : ''}`} style=${pullY > 0 ? { transform: `translateY(${pagePullY}px)` } : undefined}>
        ${tab === 'settings' && html`<${SettingsView} me=${hub.data?.me ?? null} projectName=${projectName} theme=${theme} />`}
        ${tab === 'discover' && !backlogAlbumId && html`<${ExploreView} projectName=${projectName} source=${discoverSource || 'global'} mode=${discoverMode || 'browse'} initialQuery=${discoverQuery || ''} />`}
        ${tab === 'discover' && backlogAlbumId && html`<${DiscoverAlbumView} albumSlug=${backlogAlbumId} projectName=${projectName} source=${discoverSource || 'global'} hubData=${hub.data} initialTab=${discoverAlbumTab || 'summary'} reviewKeyword=${discoverReviewKeyword || ''} />`}
        ${tab !== 'settings' && tab !== 'discover' && hub.status === 'loading' && html`<${Loading} />`}
        ${tab !== 'settings' && tab !== 'discover' && hub.status === 'error' && html`<${ErrorCard} error=${hub.error} projectName=${projectName} onRetry=${hub.refresh} />`}
        ${tab !== 'settings' && tab !== 'discover' && hub.status === 'ready' && html`
          <div class="status-row">
            ${hub.refreshing
              ? html`<span><${LankyPartyMascot} />Refreshing…</span>`
              : html`<span>${hub.stale ? 'Showing cached data' : `Updated ${new Date(hub.fetchedAt).toLocaleTimeString()}`}</span>`}
            <a href="#" onClick=${(e) => { e.preventDefault(); hub.refresh(); }}>Refresh</a>
          </div>
          ${tab === 'today' && html`<${TodayView} projectName=${projectName} me=${hub.data.me} backlog=${backlog} subTab=${subTab} comparison=${comparison} />`}
          ${tab === 'backlog' && (backlogAlbumId
            ? html`<${BacklogAlbumView} projectName=${projectName} entry=${backlogEntry} groupSlug=${groupSlug} comparison=${comparison} subTab=${subTab} onRated=${() => { Promise.resolve(hub.refresh()).then(() => navigateTo(routePath(projectName, 'backlog'))); }} />`
            : html`<${BacklogView} projectName=${projectName} backlog=${backlog} members=${hub.data.members} />`
          )}
          ${tab === 'album' && html`<${AlbumDetailView} projectName=${projectName} albumRecord=${albumRecord} groupSlug=${groupSlug} comparison=${comparison} subTab=${subTab} />`}
          ${tab === 'group' && html`<${GroupView} group=${hub.data.group} members=${hub.data.members} projectName=${projectName} />`}
          ${tab === 'activity' && html`<${ActivityView} members=${hub.data.members} projectName=${projectName} group=${hub.data.group} notifications=${notifications} />`}
          ${tab === 'pair' && html`<${PairDetailView} projectName=${projectName} members=${hub.data.members} pairA=${pairA} pairB=${pairB} />`}
          ${tab === 'me' && html`<${MeView} me=${hub.data.me} projectName=${projectName} />`}
          ${tab === 'member' && html`<${MemberView} memberName=${memberName} project=${hub.data.members[memberName]} projectName=${projectName} />`}
