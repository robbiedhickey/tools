        Confirmed working against `currentAlbum` (today's still-unrated pick), not just backlog
        entries. Unlike `rateAlbum`, there's no "already submitted" guard here: resubmitting the
        same or a different note both just succeed, freely overwriting whatever was there.
      operationId: saveListeningNote
      parameters:
        - { name: projectName, in: path, required: true, schema: { type: string } }
        - name: albumId
          in: path
          required: true
          description: The album's `uuid` (confirmed working against `currentAlbum.uuid`).
