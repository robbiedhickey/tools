components:
  securitySchemes:
    ApiAccessToken:
      type: apiKey
      in: header
      name: x-api-access
      description: |
        Optional. No endpoint requires this. Without it, requests are informally rate-limited to
        roughly 3 requests/minute per the maintainer's 2023-01-10 update. The maintainer offered
        higher-volume tokens by direct message; there is no self-serve way to obtain one.

  responses:
    RateLimited:
      description: |
        Rate limit exceeded. The limit is informal and undocumented in detail — roughly
        3 requests/minute without a token. Send `x-api-access` with a maintainer-issued token to
        raise it.
    UnknownError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: true
            errorCode: unknown-error
            message: Something went wrong

  schemas:
    Error:
      type: object
      properties:
        error:
          type: boolean
          example: true
        errorCode:
          type: string
          example: project-not-found
        message:
          type: string
          example: Project Not Found
      required: [error, errorCode, message]

    Image:
      type: object
      description: |
        Pulled directly from Spotify's API. Usually 640x640, 300x300, and 64x64, but exact
        dimensions vary per album (not guaranteed to be exactly these three sizes).
      properties:
        height:
          type: integer
          example: 640
        width:
          type: integer
          example: 640
        url:
          type: string
          format: uri
      required: [height, width, url]

    Album:
      type: object
      description: Full album metadata, including cross-platform IDs for streaming services.
      properties:
        uuid:
          type: string
          description: Internal album identifier. Required for `/groups/{groupSlug}/albums/{albumUuid}`.
          example: 5f34ee8bf0857e55ed5ebebb
        artist:
          type: string
        artistOrigin:
          type: string
          description: Coarse country/region code for the artist (e.g. `us`, `uk`, `other`).
          example: us
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        genres:
          type: array
          items:
            type: string
        styles:
          type: array
          items:
            type: string
        subGenres:
          type: array
          items:
            type: string
        name:
          type: string
        slug:
          type: string
        releaseDate:
          type: string
          example: "1988"
        globalReviewsUrl:
          type: string
          format: uri
        wikipediaUrl:
          type: string
          format: uri
        spotifyId:
          type: string
        appleMusicId:
          type: string
        tidalId:
          type: integer
        amazonMusicId:
          type: string
        youtubeMusicId:
          type: string
        qobuzId:
          type: string
        deezerId:
          type: string
      required: [uuid, artist, name, slug, spotifyId]

    AlbumStat:
      type: object
      description: Album metadata plus aggregate voting stats (no internal `uuid`/cross-platform IDs beyond Spotify).
      properties:
        name:
          type: string
        artist:
          type: string
        artistOrigin:
          type: string
        releaseDate:
          type: string
        genres:
          type: array
          items:
            type: string
        styles:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        slug:
          type: string
        spotifyId:
          type: string
        votes:
          type: integer
        averageRating:
          type: number
        controversialScore:
          type: number
          description: Rating deviation across voters; higher means more disagreement.
        globalReviewsUrl:
          type: string
          format: uri
      required: [name, artist, votes, averageRating, controversialScore]

    UserAlbumStat:
      allOf:
        - $ref: "#/components/schemas/AlbumStat"
        - type: object
          properties:
            votesByGrade:
              type: object
              description: Count of votes received at each rating level, keyed "1" through "5".
              properties:
                "1":
                  type: integer
                "2":
                  type: integer
                "3":
                  type: integer
                "4":
                  type: integer
                "5":
                  type: integer
          required: [votesByGrade]

    RatedAlbum:
      description: An `Album` plus this particular group's votes/rating/listen date for it.
      allOf:
        - $ref: "#/components/schemas/Album"
        - type: object
          properties:
            votes:
              type: integer
            totalRating:
              type: integer
            averageRating:
              type: number
            listenedAt:
              type: string
              format: date-time

    GroupMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    GenreStat:
      type: object
      properties:
        genre:
          type: string
        numberOfAlbums:
          type: integer
        totalRating:
          type: integer
        votes:
          type: integer
        numberOfVotes:
          type: integer
        rating:
          type: number

    DecadeStat:
      type: object
      properties:
        decade:
          type: string
          example: "1980"
        totalRating:
          type: integer
        votes:
          type: integer
        numberOfAlbums:
          type: integer
        rating:
          type: number

    FilteredSelection:
      type: object
      description: Genre/selection filters configured for the group, if any.
      properties:
        selections:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string

    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        paused:
          type: boolean
          description: |
            Omitted from the response entirely (not sent as `false`) when the group isn't
            paused. Only present, as `true`, once the group is actually paused. Treat absence
            as "not paused".
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"
        filteredSelection:
          allOf:
            - $ref: "#/components/schemas/FilteredSelection"
          description: |
            Always `{selections: [], genres: []}` in practice, including on active groups with
            real voting history. Either this filtering feature is unused/legacy, or it requires
            a setup step not exposed anywhere in this API.
        currentAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
        currentUserAlbum:
          type: object
          description: |
            Always `null` in practice, including on active groups with real voting history.
            Appears unused or vestigial; its shape if it were ever populated is unknown.
          nullable: true
        latestAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
          description: Most recent album that has votes attached to it.
        highestRatedAlbums:
          type: array
          items:
            $ref: "#/components/schemas/RatedAlbum"
        lowestRatedAlbums:
          type: array
          items:
            $ref: "#/components/schemas/RatedAlbum"
        favoriteGenres:
          type: array
          items:
            $ref: "#/components/schemas/GenreStat"
        worstGenres:
          type: array
          items:
            $ref: "#/components/schemas/GenreStat"
        ratingByDecade:
          type: array
          items:
            $ref: "#/components/schemas/DecadeStat"
        numberOfGeneratedAlbums:
          type: integer
        totalVotes:
          type: integer
        averageRating:
          type: number
      required: [id, name, slug, members]

    UpdateFrequency:
      type: string
      enum: [daily, dailyWithWeekends]
      description: |
        Misleadingly named: `daily` actually means weekdays-only (the original behavior before
        weekend albums existed); `dailyWithWeekends` generates an album every calendar day.

    Rating:
      description: |
        Either an integer grade 1-5, or the literal string `"did-not-listen"` when the user
        marked the day as not listened to. Also shows up as JSON `null` (e.g. a group member who
        hasn't rated the album yet in `GroupAlbumReviews.reviews[].rating`).
      oneOf:
        - type: integer
          minimum: 1
          maximum: 5
        - type: string
          enum: [did-not-listen]

    HistoryEntry:
      type: object
      description: |
        One day's entry in a project's history. If `revealedAlbum` is `false` (the user chose not
        to reveal that day), `album`, `rating`, and `review` are omitted entirely rather than
        being present-but-null.
      properties:
        generatedAlbumId:
          type: string
        revealedAlbum:
          type: boolean
        generatedAt:
          type: string
          format: date-time
          description: When this album was generated for the user (not when the day "started").
        globalRating:
          type: number
          description: The album's all-time average rating across all users of the site.
        album:
          allOf:
            - $ref: "#/components/schemas/Album"
          description: Omitted when `revealedAlbum` is `false`.
        rating:
          allOf:
            - $ref: "#/components/schemas/Rating"
          description: Omitted when `revealedAlbum` is `false`.
        review:
          type: string
          nullable: true
          description: |
            Free text, no markdown. Omitted when `revealedAlbum` is `false`. Independent of
            `rating` — a member can rate without leaving a note, so `rating` can be set while
            `review` is `null`.
          example: "Goes so hard. It would have been hard for me to not give this a 5 even if I'd hated every track, the influence this has had makes it a 5 almost by itself."
      required: [generatedAlbumId, revealedAlbum, generatedAt, globalRating]

    ProjectGroupRef:
      type: object
      description: Minimal pointer to the project's group, if it belongs to one.
      properties:
        slug:
          type: string
        paused:
          type: boolean
          description: |
            Omitted (not sent as `false`) when the group isn't paused, same as `Group.paused`.
            Treat absence as "not paused".
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"

    Project:
      type: object
      properties:
        name:
          type: string
          description: Omitted when the project was looked up by `sharerId` instead of by name.
        shareableUrl:
          type: string
          format: uri
        currentAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
        currentAlbumNotes:
          type: string
          description: Personal notes on the current album. An empty string when unset, not omitted or null.
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"
        paused:
          type: boolean
          description: |
            Omitted from the response entirely (not sent as `false`) when the project isn't
            paused. Only present, as `true`, once actually paused. Treat absence as "not paused".
        history:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        group:
          type: object
          allOf:
            - $ref: "#/components/schemas/ProjectGroupRef"
          nullable: true
      required: [shareableUrl, currentAlbumNotes, updateFrequency, history]

    AlbumReview:
      type: object
      properties:
        projectName:
          type: string
        rating:
          allOf:
            - $ref: "#/components/schemas/Rating"
          description: May be `null` (member hasn't rated the album).
        review:
          type: string
          nullable: true
      required: [projectName]

    GroupAlbumReviews:
      type: object
      properties:
        albumName:
          type: string
        albumArtist:
          type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/AlbumReview"
      required: [albumName, albumArtist, reviews]

    Notification:
      type: object
      description: |
        One entry in a project's `/api/notifications/{projectName}` feed. `data`'s shape depends
        on `type` — see the `NotificationData*` schemas. Types observed live as of 2026-06-22:
        `groupReview`, `albumsRated`, `groupAlbumsGenerated`, `custom`, `newGroupMember`,
        `donationPush`, `signup`. This list came from sampling one active account's history and is
        not guaranteed exhaustive — treat unrecognized `type` values defensively.
      properties:
        _id:
          type: string
        project:
          type: string
          description: The project's internal id — not its name/slug.
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        type:
          type: string
          enum: [groupReview, albumsRated, groupAlbumsGenerated, custom, newGroupMember, donationPush, signup]
        data:
          description: Shape depends on `type`. See the `NotificationData*` schemas below.
          oneOf:
            - $ref: "#/components/schemas/NotificationDataGroupReview"
            - $ref: "#/components/schemas/NotificationDataAlbumsRated"
            - $ref: "#/components/schemas/NotificationDataGroupAlbumsGenerated"
            - $ref: "#/components/schemas/NotificationDataCustom"
            - $ref: "#/components/schemas/NotificationDataNewGroupMember"
            - $ref: "#/components/schemas/NotificationDataDonationPush"
            - $ref: "#/components/schemas/NotificationDataSignup"
      required: [_id, project, createdAt, read, type, data]

    NotificationDataGroupReview:
      type: object
      description: A group member rated an album. (`Notification.type == groupReview`)
      properties:
        albumName:
          type: string
        albumId:
          type: string
          description: |
            Matches `Album.uuid` elsewhere in this API — usable with
            `/groups/{groupSlug}/albums/{albumUuid}` or the album's internal route.
        rating:
          type: integer
          minimum: 1
          maximum: 5
        groupSlug:
          type: string
        projectName:
          type: string
          description: The member who submitted the review — not the notification's recipient.
        isUserAlbum:
          type: boolean
          description: Observed as always `false` in every sample gathered; exact meaning unconfirmed.
      required: [albumName, albumId, rating, groupSlug, projectName]

    NotificationDataAlbumsRated:
      type: object
      description: |
        Personal milestone — the project crossed a round number of rated albums.
        (`Notification.type == albumsRated`)
      properties:
        numberOfAlbums:
          type: integer
      required: [numberOfAlbums]

    NotificationDataGroupAlbumsGenerated:
      type: object
      description: |
        The project's group crossed a round number of generated albums.
        (`Notification.type == groupAlbumsGenerated`)
      properties:
        numberOfAlbums:
          type: integer
        groupId:
          type: string
        groupSlug:
          type: string
      required: [numberOfAlbums, groupId, groupSlug]

    NotificationDataCustom:
      type: object
      description: |
        Site-wide announcement, e.g. a feature change. (`Notification.type == custom`)
      properties:
        heading:
          type: string
        body:
          type: string
      required: [heading, body]

    NotificationDataNewGroupMember:
      type: object
      description: Someone joined the project's group. (`Notification.type == newGroupMember`)
      properties:
        groupSlug:
          type: string
      required: [groupSlug]

    NotificationDataDonationPush:
      type: object
      description: |
        Periodic reminder nudging the project to support the site.
        (`Notification.type == donationPush`)
      properties:
        projectName:
          type: string
      required: [projectName]

    NotificationDataSignup:
      type: object
      description: Sent once when the project was first created. (`Notification.type == signup`)
      properties:
        projectName:
          type: string
      required: [projectName]

    GroupChatMessage:
      type: object
      properties:
        _id:
          type: string
        group:
          type: string
          description: The group's internal id — not its `slug`.
        author:
          type: string
          description: Free-text name the poster typed in, not necessarily a project name.
        text:
          type: string
        postedAt:
          type: string
          format: date-time
      required: [_id, group, author, text, postedAt]

    InferredWriteResponse:
      type: object
      description: |
        Generic placeholder shape for the "Account Actions (write, unverified)" endpoints — none
        of those were called live, so this is reconstructed only from `.then(e => if (e.success)
        ... else if (e.error) ...)`-style branches in the site's own minified JS, not from an
        actual response body. Real responses likely include operation-specific fields beyond
        these two; treat this schema as a lower bound, not a complete one.
      properties:
        success:
          type: boolean
        error:
          type: boolean
        message:
          type: string
