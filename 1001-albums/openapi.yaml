  /{projectName}/{albumUuid}/rate:
    servers:
      - url: https://1001albumsgenerator.com/api
    post:
      tags: [Account Actions (write, unverified)]
      summary: "Verified: rate any unrated backlog album — the core write action of the whole site"
      description: |
        **Verified live 2026-06-23 — see `1001-albums/WRITE_API_PLAN.md`.** Requires zero
        authentication: a plain server-side POST with no cookies and no special headers
        succeeded. This is what every rating submitted through the real UI ultimately calls,
        confirmed by directly observing the real history page's "Rate" button fire this exact
        request.

        Correction from earlier (unverified) versions of this doc: the path parameter is the
        album's **`uuid`**, not `generatedAlbumId` — those are two different 24-hex Mongo
        ObjectIds that look alike. Confirmed by the one real captured example having different
        values in the URL vs. the body all along.

        Works against **any unrated entry in the project's history**, not just the single
        "current pending" one referenced by the profile page's
        `window.albumGenerator.rate.previousAlbumId`/`previousAlbumGeneratedAlbumId` — confirmed
        by successfully rating a backlog album other than that one, through the real history
        page's own UI. (An earlier draft of this doc claimed the opposite, based on a test whose
        IDs were accidentally malformed rather than genuinely rejected for being the wrong
        album — see `WRITE_API_PLAN.md` for the full correction.) The only real gate found is
        re-rating an **already-rated** entry, which returns the same `{"success":false,"error":{}}`
        shown below.

        There is no known way to undo a submitted rating.
      operationId: rateAlbum
      parameters:
        - { name: projectName, in: path, required: true, schema: { type: string } }
        - name: albumUuid
          in: path
          required: true
          description: |
            The target history entry's album `uuid` (`HistoryEntry.album.uuid` elsewhere in this
            API) — not `generatedAlbumId`.
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  allOf: [{ $ref: "#/components/schemas/Rating" }]
                notes:
                  type: string
                  description: Listening notes saved alongside the rating.
                fromHistoryView:
                  type: boolean
                  description: Whether this came from the history/backlog UI vs. the daily card.
                generatedAlbumId:
                  type: string
                  description: |
                    The same history entry's `generatedAlbumId` (`HistoryEntry.generatedAlbumId`
                    elsewhere in this API) — a *different* value from the `albumUuid` path param,
                    not redundant with it. Must belong to the same entry as `albumUuid`.
                isUserAlbum:
                  type: boolean
              required: [rating]
      responses:
        "200":
          description: |
            Verified live. `success: false` (still HTTP 200) when the target entry is already
            rated, or when `albumUuid`/`generatedAlbumId` don't both belong to the same history
            entry. `allAlbumsRated: true` triggers a full page reload in the site's own code,
            implying it signals "you've now rated every album the book has."
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success: { type: boolean, enum: [true] }
                      allAlbumsRated: { type: boolean }
                  - type: object
                    properties:
                      success: { type: boolean, enum: [false] }
                      error: { type: object }
              examples:
                accepted:
                  summary: Rated a previously-unrated entry
                  value: { success: true, allAlbumsRated: false }
                rejected:
                  summary: Already rated, or mismatched/malformed IDs
                  value: { success: false, error: {} }

  /{projectName}/{albumId}/listening-note:
    servers:
      - url: https://1001albumsgenerator.com/api
    post:
      tags: [Account Actions (write, unverified)]
      summary: "Verified: save a listening note independent of rating"
      description: |
        **Verified live 2026-06-23 — see `1001-albums/WRITE_API_PLAN.md`.** Requires zero
        authentication: a plain server-side POST with no cookies and no special headers
        succeeded. Confirmed as a real write (not a no-op) by setting a distinct value, reading
