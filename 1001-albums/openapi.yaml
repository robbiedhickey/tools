openapi: 3.0.3
info:
  title: 1001albumsgenerator.com Public API
  version: "1.0.0"
  description: |
    Unofficial OpenAPI specification for the read-only JSON API exposed by
    [1001albumsgenerator.com](https://1001albumsgenerator.com), a site that generates a daily
    album (from the book *1001 Albums You Must Hear Before You Die*) for a user or group to
    listen to and rate.

    **This spec is reverse-engineered, not maintained by the site owner.** It was assembled from:
    - The maintainer's (u/SidledsGunnar) original announcement and follow-up comments in
      [r/1001AlbumsGenerator "JSON API"](https://www.reddit.com/r/1001AlbumsGenerator/comments/p6xw6y/json_api/)
      (and its Wayback Machine snapshots from 2021-2025, since live access to that thread was
      blocked during research).
    - Live requests against the production API made on 2026-06-18.

    There is no official Swagger/OpenAPI doc, versioning header, or changelog published by the
    site. Treat every field here as best-effort and re-verify against the live API before
    depending on it for anything important.

    ## How this API actually behaves
    - The API was deliberately "thrown together quickly based on user requests" — it is not a
      designed-first contract, and it shows in the inconsistencies below.
    - `groups/:groupSlug/albums/:albumUuid`, `albums/stats`, and `user-albums/stats` are newer
      additions; the original 2021 release only had `groups/:groupSlug` and
      `projects/:projectIdentifier`.
    - No authentication is required for any endpoint. There's an informal rate limit (the
      maintainer has described it as "~3 requests/minute"). Higher-volume access uses a token
      sent as the `x-api-access` request header, obtained by DMing the maintainer directly —
      there's no self-serve way to get one.
    - There are no POST/write endpoints. Rating albums, editing reviews, and unpausing a project
      all require using the website; none of it is exposed over the API. This is tied to the site
      having no authentication system for write access.
    - `/api/v2/...` does not exist (404s in production), despite having been floated once as a
      future plan for "more structured and cleaned up data."
    - New albums are generated by a server-side cron job at 03:00 GMT regardless of whether the
      user visits the site. A project auto-pauses if nobody rates an album for 4 consecutive days,
      with no API-exposed way to prevent or reverse that.
    - `updateFrequency: daily` means "weekdays only" — only `dailyWithWeekends` generates an album
      every calendar day. The naming is misleading but that's the actual behavior.
    - Image objects are pulled directly from Spotify's API. Most albums have exactly three sizes
      (640x640, 300x300, 64x64), but some have slightly different dimensions (e.g. 634x640)
      because that's what Spotify's API returned for that cover art — don't assume fixed sizes.
    - `history[].rating` is typed inconsistently: an integer 1-5 normally, but the literal string
      `"did-not-listen"` when the user marks a day as not listened to.
    - `history` entries for days the user chose not to reveal (`revealedAlbum: false`) omit the
      `album`, `rating`, and `review` fields entirely rather than setting them to `null`.
    - `history[].globalRating` is the album's all-time average rating across all users of the
      site (for comparing a personal/group rating against the wider consensus). It's absent from
      the CSV export the site also offers.
    - The `projectIdentifier` path param accepts either the project's plain-text name (the slug in
      `1001albumsgenerator.com/:name`) or the opaque `sharerId` from a project's share URL
      (`1001albumsgenerator.com/shares/:sharerId`). Looking it up by `sharerId` omits the `name`
      field from the response, so a share link doesn't leak the underlying project/user name.
    - `groups/:groupSlug/albums/:albumUuid` takes the album's internal `uuid` (as found in any
      other response's `album.uuid`), **not** its `spotifyId` — passing a `spotifyId` returns a
      500 `unknown-error`.
    - `paused` (on `Group`, `Project`, and the embedded `Project.group`) is omitted from the
      response entirely when the group/project is not paused, rather than being sent as `false`.
      It only shows up, as `true`, once something is actually paused. Treat its absence as "not
      paused."
    - `Group.filteredSelection` is always `{selections: [], genres: []}` and
      `Group.currentUserAlbum` is always `null`, on every group sampled — including a real,
      active 9-member group with 172 votes. Both fields appear unused or vestigial in the current
      API; nothing in the available path/query params populates them.
  contact:
    name: Source thread (unofficial, maintained by site owner u/SidledsGunnar)
    url: https://www.reddit.com/r/1001AlbumsGenerator/comments/p6xw6y/json_api/

servers:
  - url: https://1001albumsgenerator.com/api/v1

security:
  - {}
  - ApiAccessToken: []

tags:
  - name: Groups
    description: Multi-user groups that share a daily album and rate it together.
  - name: Projects
    description: A single user's run (their personal daily album and rating history).
  - name: Stats
    description: Site-wide aggregate album statistics, not scoped to any one user or group.

paths:
  /groups/{groupSlug}:
    get:
      tags: [Groups]
      summary: Get a group
      description: |
        Returns a summary of a group: members, current/latest album, all-time high/low rated
        albums, favorite/worst genres, rating-by-decade breakdown, and aggregate stats.

        `groupSlug` is the group name, lower-cased with spaces replaced by hyphens. Find it in
        the URL of the group's page on the site if unsure.
      operationId: getGroup
      parameters:
        - name: groupSlug
          in: path
          required: true
          schema:
            type: string
          example: test
          description: Lower-case, hyphenated group name (as it appears in the group's page URL).
      responses:
        "200":
          description: Group summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                errorCode: group-not-found
                message: Group Not Found
        "500":
          $ref: "#/components/responses/UnknownError"

  /groups/{groupSlug}/albums/{albumUuid}:
    get:
      tags: [Groups]
      summary: Get a group's reviews for one album
      description: |
        Returns every member's rating/review of a specific album within the group, including
        members who haven't rated it yet (`rating`/`review` are `null` for them).

        `albumUuid` must be the album's internal `uuid` (e.g. from `Group.currentAlbum.uuid` or
        any other album object in this API) — passing the album's `spotifyId` instead returns a
        500 `unknown-error`.
      operationId: getGroupAlbumReviews
      parameters:
        - name: groupSlug
          in: path
          required: true
          schema:
            type: string
          example: test
        - name: albumUuid
          in: path
          required: true
          schema:
            type: string
          description: The album's internal `uuid`, not its `spotifyId`.
          example: 5f34ee8bf0857e55ed5ebebb
      responses:
        "200":
          description: Per-member reviews for the album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupAlbumReviews"
              example:
                albumName: Nevermind
                albumArtist: Nirvana
                reviews:
                  - projectName: lankyserv
                    rating: 5
                    review: "Goes so hard. It would have been hard for me to not give this a 5 even if I'd hated every track, the influence this has had makes it a 5 almost by itself."
                  - projectName: hodorswit
                    rating: 5
                    review: "Every song is a classic, and some are way heavier than I remember. Undeniable influence, a timeless masterpiece."
                  - projectName: that0therguy
                    rating: null
                    review: null
                  - projectName: clutchy
                    rating: 5
                    review: null
                  - projectName: seanph1001
                    rating: did-not-listen
                    review: null
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: |
            Unknown error. Happens when `albumUuid` is a `spotifyId` instead of an internal
            `uuid`, or when the group has no association with the album at all.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                errorCode: unknown-error
                message: Something went wrong

  /projects/{projectIdentifier}:
    get:
      tags: [Projects]
      summary: Get a project (a single user's run)
      description: |
        Returns a project's current album, current album notes, full rating history, update
        frequency, pause state, and (if applicable) its group.

        `projectIdentifier` may be either the project's name (as in
        `1001albumsgenerator.com/:name`) or the opaque `sharerId` from its share URL
        (`1001albumsgenerator.com/shares/:sharerId`). When a `sharerId` is used, the response
        omits `name` so the share link doesn't leak the underlying project/user name.
      operationId: getProject
      parameters:
        - name: projectIdentifier
          in: path
          required: true
          schema:
            type: string
          example: test
          description: Project name, or the `sharerId` segment of its share URL.
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                errorCode: project-not-found
                message: Project Not Found
        "500":
          $ref: "#/components/responses/UnknownError"

  /albums/stats:
    get:
      tags: [Stats]
      summary: Get global stats for every album
      description: |
        Returns votes, average rating, genres/styles, and a "controversial score" (rating
        deviation — higher means more disagreement among voters) for every album in the book,
        aggregated across all users of the site.
      operationId: getAlbumStats
      responses:
        "200":
          description: Album stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items:
                      $ref: "#/components/schemas/AlbumStat"
        "429":
          $ref: "#/components/responses/RateLimited"

  /user-albums/stats:
    get:
      tags: [Stats]
      summary: Get global per-user-vote stats for every album
      description: |
        Same data as `/albums/stats`, plus a `votesByGrade` breakdown (count of votes at each of
        the five rating levels) per album. This is the newest endpoint documented in the source
        thread (added after the `albums/stats` endpoint).
      operationId: getUserAlbumStats
      responses:
        "200":
          description: User album stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserAlbumStat"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  securitySchemes:
    ApiAccessToken:
      type: apiKey
      in: header
      name: x-api-access
      description: |
        Optional. No endpoint requires this. Without it, requests are informally rate-limited to
        roughly 3 requests/minute per the maintainer's 2023-01-10 update. The maintainer offered
        higher-volume tokens by direct message; there is no self-serve way to obtain one.

  responses:
    RateLimited:
      description: |
        Rate limit exceeded. The limit is informal and undocumented in detail — roughly
        3 requests/minute without a token. Send `x-api-access` with a maintainer-issued token to
        raise it.
    UnknownError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: true
            errorCode: unknown-error
            message: Something went wrong

  schemas:
    Error:
      type: object
      properties:
        error:
          type: boolean
          example: true
        errorCode:
          type: string
          example: project-not-found
        message:
          type: string
          example: Project Not Found
      required: [error, errorCode, message]

    Image:
      type: object
      description: |
        Pulled directly from Spotify's API. Usually 640x640, 300x300, and 64x64, but exact
        dimensions vary per album (not guaranteed to be exactly these three sizes).
      properties:
        height:
          type: integer
          example: 640
        width:
          type: integer
          example: 640
        url:
          type: string
          format: uri
      required: [height, width, url]

    Album:
      type: object
      description: Full album metadata, including cross-platform IDs for streaming services.
      properties:
        uuid:
          type: string
          description: Internal album identifier. Required for `/groups/{groupSlug}/albums/{albumUuid}`.
          example: 5f34ee8bf0857e55ed5ebebb
        artist:
          type: string
        artistOrigin:
          type: string
          description: Coarse country/region code for the artist (e.g. `us`, `uk`, `other`).
          example: us
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        genres:
          type: array
          items:
            type: string
        styles:
          type: array
          items:
            type: string
        subGenres:
          type: array
          items:
            type: string
        name:
          type: string
        slug:
          type: string
        releaseDate:
          type: string
          example: "1988"
        globalReviewsUrl:
          type: string
          format: uri
        wikipediaUrl:
          type: string
          format: uri
        spotifyId:
          type: string
        appleMusicId:
          type: string
        tidalId:
          type: integer
        amazonMusicId:
          type: string
        youtubeMusicId:
          type: string
        qobuzId:
          type: string
        deezerId:
          type: string
      required: [uuid, artist, name, slug, spotifyId]

    AlbumStat:
      type: object
      description: Album metadata plus aggregate voting stats (no internal `uuid`/cross-platform IDs beyond Spotify).
      properties:
        name:
          type: string
        artist:
          type: string
        artistOrigin:
          type: string
        releaseDate:
          type: string
        genres:
          type: array
          items:
            type: string
        styles:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        slug:
          type: string
        spotifyId:
          type: string
        votes:
          type: integer
        averageRating:
          type: number
        controversialScore:
          type: number
          description: Rating deviation across voters; higher means more disagreement.
        globalReviewsUrl:
          type: string
          format: uri
      required: [name, artist, votes, averageRating, controversialScore]

    UserAlbumStat:
      allOf:
        - $ref: "#/components/schemas/AlbumStat"
        - type: object
          properties:
            votesByGrade:
              type: object
              description: Count of votes received at each rating level, keyed "1" through "5".
              properties:
                "1":
                  type: integer
                "2":
                  type: integer
                "3":
                  type: integer
                "4":
                  type: integer
                "5":
                  type: integer
          required: [votesByGrade]

    RatedAlbum:
      description: An `Album` plus this particular group's votes/rating/listen date for it.
      allOf:
        - $ref: "#/components/schemas/Album"
        - type: object
          properties:
            votes:
              type: integer
            totalRating:
              type: integer
            averageRating:
              type: number
            listenedAt:
              type: string
              format: date-time

    GroupMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    GenreStat:
      type: object
      properties:
        genre:
          type: string
        numberOfAlbums:
          type: integer
        totalRating:
          type: integer
        votes:
          type: integer
        numberOfVotes:
          type: integer
        rating:
          type: number

    DecadeStat:
      type: object
      properties:
        decade:
          type: string
          example: "1980"
        totalRating:
          type: integer
        votes:
          type: integer
        numberOfAlbums:
          type: integer
        rating:
          type: number

    FilteredSelection:
      type: object
      description: Genre/selection filters configured for the group, if any.
      properties:
        selections:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string

    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        paused:
          type: boolean
          description: |
            Omitted from the response entirely (not sent as `false`) when the group isn't
            paused. Only present, as `true`, once the group is actually paused. Treat absence
            as "not paused".
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"
        filteredSelection:
          allOf:
            - $ref: "#/components/schemas/FilteredSelection"
          description: |
            Always `{selections: [], genres: []}` in practice, including on active groups with
            real voting history. Either this filtering feature is unused/legacy, or it requires
            a setup step not exposed anywhere in this API.
        currentAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
        currentUserAlbum:
          type: object
          description: |
            Always `null` in practice, including on active groups with real voting history.
            Appears unused or vestigial; its shape if it were ever populated is unknown.
          nullable: true
        latestAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
          description: Most recent album that has votes attached to it.
        highestRatedAlbums:
          type: array
          items:
            $ref: "#/components/schemas/RatedAlbum"
        lowestRatedAlbums:
          type: array
          items:
            $ref: "#/components/schemas/RatedAlbum"
        favoriteGenres:
          type: array
          items:
            $ref: "#/components/schemas/GenreStat"
        worstGenres:
          type: array
          items:
            $ref: "#/components/schemas/GenreStat"
        ratingByDecade:
          type: array
          items:
            $ref: "#/components/schemas/DecadeStat"
        numberOfGeneratedAlbums:
          type: integer
        totalVotes:
          type: integer
        averageRating:
          type: number
      required: [id, name, slug, members]

    UpdateFrequency:
      type: string
      enum: [daily, dailyWithWeekends]
      description: |
        Misleadingly named: `daily` actually means weekdays-only (the original behavior before
        weekend albums existed); `dailyWithWeekends` generates an album every calendar day.

    Rating:
      description: |
        Either an integer grade 1-5, or the literal string `"did-not-listen"` when the user
        marked the day as not listened to. Also shows up as JSON `null` (e.g. a group member who
        hasn't rated the album yet in `GroupAlbumReviews.reviews[].rating`).
      oneOf:
        - type: integer
          minimum: 1
          maximum: 5
        - type: string
          enum: [did-not-listen]

    HistoryEntry:
      type: object
      description: |
        One day's entry in a project's history. If `revealedAlbum` is `false` (the user chose not
        to reveal that day), `album`, `rating`, and `review` are omitted entirely rather than
        being present-but-null.
      properties:
        generatedAlbumId:
          type: string
        revealedAlbum:
          type: boolean
        generatedAt:
          type: string
          format: date-time
          description: When this album was generated for the user (not when the day "started").
        globalRating:
          type: number
          description: The album's all-time average rating across all users of the site.
        album:
          allOf:
            - $ref: "#/components/schemas/Album"
          description: Omitted when `revealedAlbum` is `false`.
        rating:
          allOf:
            - $ref: "#/components/schemas/Rating"
          description: Omitted when `revealedAlbum` is `false`.
        review:
          type: string
          nullable: true
          description: |
            Free text, no markdown. Omitted when `revealedAlbum` is `false`. Independent of
            `rating` — a member can rate without leaving a note, so `rating` can be set while
            `review` is `null`.
          example: "Goes so hard. It would have been hard for me to not give this a 5 even if I'd hated every track, the influence this has had makes it a 5 almost by itself."
      required: [generatedAlbumId, revealedAlbum, generatedAt, globalRating]

    ProjectGroupRef:
      type: object
      description: Minimal pointer to the project's group, if it belongs to one.
      properties:
        slug:
          type: string
        paused:
          type: boolean
          description: |
            Omitted (not sent as `false`) when the group isn't paused, same as `Group.paused`.
            Treat absence as "not paused".
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"

    Project:
      type: object
      properties:
        name:
          type: string
          description: Omitted when the project was looked up by `sharerId` instead of by name.
        shareableUrl:
          type: string
          format: uri
        currentAlbum:
          type: object
          allOf:
            - $ref: "#/components/schemas/Album"
          nullable: true
        currentAlbumNotes:
          type: string
          description: Personal notes on the current album. An empty string when unset, not omitted or null.
        updateFrequency:
          $ref: "#/components/schemas/UpdateFrequency"
        paused:
          type: boolean
          description: |
            Omitted from the response entirely (not sent as `false`) when the project isn't
            paused. Only present, as `true`, once actually paused. Treat absence as "not paused".
        history:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        group:
          type: object
          allOf:
            - $ref: "#/components/schemas/ProjectGroupRef"
          nullable: true
      required: [shareableUrl, currentAlbumNotes, updateFrequency, history]

    AlbumReview:
      type: object
      properties:
        projectName:
          type: string
        rating:
          allOf:
            - $ref: "#/components/schemas/Rating"
          description: May be `null` (member hasn't rated the album).
        review:
          type: string
          nullable: true
      required: [projectName]

    GroupAlbumReviews:
      type: object
      properties:
        albumName:
          type: string
        albumArtist:
          type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/AlbumReview"
      required: [albumName, albumArtist, reviews]
